name: Run Simulation
on: [push, workflow_dispatch]

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Generate config.h from config.py
        run: python simulation/generate_config_h.py
      - name: Run simulation in batch mode
        run: python simulation/simulate.py --days 30 --batch
